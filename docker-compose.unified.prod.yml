      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - '3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/health/live >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - app-network
      - platform-network
    labels:
      - traefik.docker.network=qxaas8snd3mked3qol4ze7g1
      - traefik.http.services.kaleem-api.loadbalancer.server.port=3000

  admin:
    container_name: ${PROJECT_SLUG}-admin
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_SF_VISUAL_BUILDER_ENABLED: ${VITE_SF_VISUAL_BUILDER_ENABLED}
        VITE_SF_ROLLOUT_STAGE: ${VITE_SF_ROLLOUT_STAGE}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - '80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/ >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - app-network
      - platform-network
    labels:
      - traefik.docker.network=qxaas8snd3mked3qol4ze7g1
      - traefik.http.services.kaleem-admin.loadbalancer.server.port=80

  storefront:
    container_name: ${PROJECT_SLUG}-storefront
    build:
      context: .
      dockerfile: Dockerfile.storefront
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_STOREFRONT_STORE_SLUG: ${NEXT_PUBLIC_STOREFRONT_STORE_SLUG}
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV}
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
      - NEXT_PUBLIC_STOREFRONT_STORE_SLUG=${NEXT_PUBLIC_STOREFRONT_STORE_SLUG}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - '3001'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3001/ >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - app-network
      - platform-network
    labels:
      - traefik.docker.network=qxaas8snd3mked3qol4ze7g1
      - traefik.http.services.kaleem-storefront.loadbalancer.server.port=3001

