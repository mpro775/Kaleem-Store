services:
  redis:
    container_name: ${PROJECT_SLUG}-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    expose:
      - '6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  rabbitmq:
    container_name: ${PROJECT_SLUG}-rabbitmq
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    env_file:
      - .env.unified
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    expose:
      - '5672'
      - '15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - app-network

  api:
    container_name: ${PROJECT_SLUG}-api
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env.unified
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - '3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/health/live >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  worker:
    container_name: ${PROJECT_SLUG}-worker
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env.unified
    working_dir: /app/apps/api
    command: ['node', 'dist/workers/outbox.worker.js']
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f outbox.worker.js']
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  worker-notifications:
    container_name: ${PROJECT_SLUG}-worker-notifications
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env.unified
    working_dir: /app/apps/api
    command: ['node', 'dist/workers/notifications.worker.js']
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f notifications.worker.js']
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - app-network

volumes:
  redis_data:
  rabbitmq_data:

networks:
  app-network:
    name: ${PROJECT_SLUG}-network
    driver: bridge
