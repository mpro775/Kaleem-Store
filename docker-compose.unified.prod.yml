services:
  redis:
    container_name: ${PROJECT_SLUG}-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    expose:
      - '6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  rabbitmq:
    container_name: ${PROJECT_SLUG}-rabbitmq
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    env_file:
      - .env.unified
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    expose:
      - '5672'
      - '15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - app-network

  api:
    container_name: ${PROJECT_SLUG}-api
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      - PROJECT_SLUG=${PROJECT_SLUG}
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
      - RABBITMQ_EXCHANGE=${RABBITMQ_EXCHANGE}
      - NOTIFICATIONS_MAIN_QUEUE=${NOTIFICATIONS_MAIN_QUEUE}
      - NOTIFICATIONS_DLQ_QUEUE=${NOTIFICATIONS_DLQ_QUEUE}
      - NOTIFICATIONS_RETRY_CREATED_QUEUE=${NOTIFICATIONS_RETRY_CREATED_QUEUE}
      - NOTIFICATIONS_RETRY_STATUS_QUEUE=${NOTIFICATIONS_RETRY_STATUS_QUEUE}
      - NOTIFICATIONS_RETRY_INVENTORY_QUEUE=${NOTIFICATIONS_RETRY_INVENTORY_QUEUE}
      - NOTIFICATIONS_MAX_RETRIES=${NOTIFICATIONS_MAX_RETRIES}
      - NOTIFICATIONS_RETRY_DELAY_MS=${NOTIFICATIONS_RETRY_DELAY_MS}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_ACCESS_EXPIRES_IN=${JWT_ACCESS_EXPIRES_IN}
      - REFRESH_TOKEN_TTL_DAYS=${REFRESH_TOKEN_TTL_DAYS}
      - AUTH_OTP_SECRET=${AUTH_OTP_SECRET}
      - AUTH_OTP_TTL_MINUTES=${AUTH_OTP_TTL_MINUTES}
      - AUTH_OTP_MAX_VERIFY_ATTEMPTS=${AUTH_OTP_MAX_VERIFY_ATTEMPTS}
      - AUTH_OTP_RESEND_COOLDOWN_SECONDS=${AUTH_OTP_RESEND_COOLDOWN_SECONDS}
      - AUTH_OTP_MAX_RESEND_COUNT=${AUTH_OTP_MAX_RESEND_COUNT}
      - PLATFORM_ADMIN_SECRET=${PLATFORM_ADMIN_SECRET}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - EMAIL_DELIVERY_MODE=${EMAIL_DELIVERY_MODE}
      - EMAIL_FROM=${EMAIL_FROM}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - RESEND_API_BASE_URL=${RESEND_API_BASE_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - INVENTORY_RESERVATION_TTL_MINUTES=${INVENTORY_RESERVATION_TTL_MINUTES}
      - THEME_PREVIEW_TOKEN_TTL_MINUTES=${THEME_PREVIEW_TOKEN_TTL_MINUTES}
      - DOMAIN_VERIFY_TXT_PREFIX=${DOMAIN_VERIFY_TXT_PREFIX}
      - DOMAIN_CNAME_TARGET=${DOMAIN_CNAME_TARGET}
      - DOMAIN_SSL_MODE=${DOMAIN_SSL_MODE}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - CSRF_ENABLED=${CSRF_ENABLED}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE}
      - S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL}
      - S3_PRESIGNED_PUT_TTL_SECONDS=${S3_PRESIGNED_PUT_TTL_SECONDS}
      - S3_PRESIGNED_GET_TTL_SECONDS=${S3_PRESIGNED_GET_TTL_SECONDS}
      - SENTRY_DSN=${SENTRY_DSN}
      - SENTRY_RELEASE=${SENTRY_RELEASE}
      - METRICS_PREFIX=${METRICS_PREFIX}
      - RABBITMQ_MANAGEMENT_URL=${RABBITMQ_MANAGEMENT_URL}
      - RABBITMQ_MANAGEMENT_USER=${RABBITMQ_MANAGEMENT_USER}
      - RABBITMQ_MANAGEMENT_PASSWORD=${RABBITMQ_MANAGEMENT_PASSWORD}
      - NOTIFICATIONS_MAIN_QUEUE_MAX_MESSAGES=${NOTIFICATIONS_MAIN_QUEUE_MAX_MESSAGES}
      - NOTIFICATIONS_DLQ_QUEUE_MAX_MESSAGES=${NOTIFICATIONS_DLQ_QUEUE_MAX_MESSAGES}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - '3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/health/live >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  worker:
    container_name: ${PROJECT_SLUG}-worker
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env.unified
    working_dir: /app/apps/api
    command: ['node', 'dist/workers/outbox.worker.js']
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f outbox.worker.js']
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  worker-notifications:
    container_name: ${PROJECT_SLUG}-worker-notifications
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env.unified
    working_dir: /app/apps/api
    command: ['node', 'dist/workers/notifications.worker.js']
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f notifications.worker.js']
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - app-network

volumes:
  redis_data:
  rabbitmq_data:

networks:
  app-network:
    name: ${PROJECT_SLUG}-network
    driver: bridge
