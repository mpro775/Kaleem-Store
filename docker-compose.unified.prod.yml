      - RESEND_API_BASE_URL=${RESEND_API_BASE_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    working_dir: /app/apps/api
    command: ['node', 'dist/workers/outbox.worker.js']
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f outbox.worker.js']
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - app-network

